name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: apps/web/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit

      # Lint step temporarily disabled - next lint is deprecated in Next.js 16
      # and requires migration to ESLint flat config. TODO: set up eslint directly.
      # - name: Lint
      #   working-directory: apps/web
      #   run: npm run lint

      - name: Test with coverage
        working-directory: apps/web
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/web/coverage/
          retention-days: 14

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Verify sidecar bundle is up to date
        working-directory: apps/sidecar
        run: |
          npm ci
          HASH_BEFORE=$(sha256sum dist/sidecar.cjs | cut -d' ' -f1)
          npm run build
          HASH_AFTER=$(sha256sum dist/sidecar.cjs | cut -d' ' -f1)
          if [ "$HASH_BEFORE" != "$HASH_AFTER" ]; then
            echo "::error::sidecar.cjs is stale! Run 'cd apps/sidecar && npm run build' and commit the result."
            exit 1
          fi
